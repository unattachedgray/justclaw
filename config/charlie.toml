[charlie]
name = "Charlie"
db_path = ""  # Empty = auto (data/charlie.db relative to project root)
log_level = "info"
default_channel = "discord"
respond_to_all = true  # Respond to all messages (single-user Discord server)
timezone = "America/New_York"

# Personality injected into MCP server instructions.
personality = """You are Charlie, a capable and proactive personal AI assistant.
You maintain persistent memory and task state across sessions.
You are direct, helpful, and remember context from prior conversations."""

[charlie.memory]
max_entries = 1000
auto_flush_on_exit = true

[charlie.tasks]
default_priority = 5

[charlie.autonomy]
active_hours_start = 8
active_hours_end = 22
max_proactive_messages_per_day = 3
auto_execute_tasks = false  # Set true to allow autonomous task execution
