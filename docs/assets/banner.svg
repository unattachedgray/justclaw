<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <rect width="900" height="300" fill="#0d1117"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#161b22" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="300" fill="url(#grid)"/>
  <!-- Glow line -->
  <rect x="100" y="148" width="700" height="1" fill="url(#glow)"/>
  <!-- Claw icon - stylized -->
  <g transform="translate(350, 60)">
    <!-- Three claw fingers -->
    <path d="M80 0 L60 50 L80 45 Z" fill="#58a6ff" opacity="0.9"/>
    <path d="M100 5 L100 55 L100 50 Z" fill="#58a6ff" opacity="0.7"/>
    <path d="M120 0 L140 50 L120 45 Z" fill="#58a6ff" opacity="0.9"/>
    <!-- Orb -->
    <circle cx="100" cy="65" r="12" fill="#58a6ff" opacity="0.15"/>
    <circle cx="100" cy="65" r="8" fill="#58a6ff" opacity="0.3"/>
    <circle cx="100" cy="65" r="4" fill="#58a6ff" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="450" y="175" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="4">justclaw</text>
  <!-- Subtitle -->
  <text x="450" y="210" text-anchor="middle" font-family="'Inter', -apple-system, sans-serif" font-size="16" fill="#8b949e" letter-spacing="2">AUTONOMOUS INFRASTRUCTURE FOR CLAUDE CODE</text>
  <!-- Stat pills -->
  <g transform="translate(195, 240)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="50" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#58a6ff">57 MCP Tools</text>
  </g>
  <g transform="translate(310, 240)">
    <rect x="0" y="0" width="120" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#58a6ff">70 Browser Cmds</text>
  </g>
  <g transform="translate(445, 240)">
    <rect x="0" y="0" width="110" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="55" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#58a6ff">Zero Cloud Deps</text>
  </g>
  <g transform="translate(570, 240)">
    <rect x="0" y="0" width="130" height="26" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="65" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#58a6ff">SQLite + FTS5</text>
  </g>
</svg>
