<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 340px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
    }
    h3 { margin: 0 0 4px; font-size: 14px; }
    .subtitle { font-size: 11px; color: #999; margin-bottom: 8px; }
    .status { padding: 8px; border-radius: 6px; margin: 8px 0; font-size: 12px; }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.warn { background: #fff3e0; color: #e65100; }
    .meter { margin: 6px 0; }
    .meter-label { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .meter-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .meter-fill { height: 100%; border-radius: 4px; }
    .meter-fill.low { background: #4caf50; }
    .meter-fill.mid { background: #ff9800; }
    .meter-fill.high { background: #f44336; }
    .info-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; color: #666; }
    .info-row .label { color: #999; }
    .divider { border-top: 1px solid #eee; margin: 8px 0; }
    button {
      width: 100%; padding: 7px; margin-top: 4px;
      background: #1a73e8; color: white; border: none;
      border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: #1557b0; }
    button.secondary { background: #666; }
    .small { font-size: 11px; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
  <h3>justclaw Browser Bridge</h3>
  <div class="subtitle">v1.0 — Usage monitor + full browser automation</div>
  <div id="content">
    <div class="status warn">Waiting for data...</div>
  </div>
  <button id="extract">Read Usage Now</button>
  <button id="openUsage" class="secondary">Open Usage Page</button>
  <div class="small" id="lastUpdate"></div>
  <script src="popup.js"></script>
</body>
</html>
